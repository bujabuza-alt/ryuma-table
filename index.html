<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="테이블현황">
<title>테이블 현황 - 류마</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif; background: #f0f2f5; color: #1e293b; overflow: hidden; position: fixed; width: 100%; height: 100dvh; }

#wrap { display: flex; flex-direction: column; width: 100%; height: 100%; }
#hd   { flex-shrink: 0; background: #fff; border-bottom: 1px solid #e2e8f0; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
#tb   { flex-shrink: 0; background: #fff; border-bottom: 1px solid #e2e8f0; display: flex; padding: 0 16px; gap: 8px; }
#body { flex: 1; display: flex; overflow: hidden; min-height: 0; position: relative; }

.hd-left  { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.hd-logo  { width: 36px; height: 36px; background: linear-gradient(135deg,#3b82f6,#6366f1); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.hd-title { font-weight: 800; font-size: 16px; }
.hd-date  { font-size: 11px; color: #94a3b8; }
.hd-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end;}
.chip     { border-radius: 99px; padding: 4px 10px; font-size: 12px; font-weight: 700; border: 1px solid; white-space: nowrap; }
#badge    { font-size: 12px; font-weight: 600; white-space: nowrap; color: transparent; }

.tab { padding: 14px 18px; border: none; background: none; font-size: 14px; font-weight: 700; color: #94a3b8; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.tab.on { color: #3b82f6; border-bottom-color: #3b82f6; }

#sb { width: 25%; max-width: 220px; min-width: 160px; flex-shrink: 0; background: #fff; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; overflow: hidden; }
.sb-head { flex-shrink: 0; padding: 12px 16px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: space-between; }
.sb-title { font-weight: 700; font-size: 14px; color: #64748b; }
#wl { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.wi { padding: 12px 16px; border-bottom: 1px solid #f8fafc; cursor: pointer; }
.wi-top { display: flex; align-items: center; justify-content: space-between; }
.wi-num { width: 22px; height: 22px; border-radius: 50%; background: #e0e7ff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: #6366f1; flex-shrink: 0; }
.wi-name { font-weight: 700; font-size: 15px; margin-left: 8px; }
.wi-g { font-size: 13px; color: #475569; font-weight: 600; }
.wi-sub { font-size: 12px; color: #94a3b8; margin-top: 4px; }
.wi-memo { font-size: 12px; color: #94a3b8; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

#main { flex: 1; position: relative; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px; display: flex; flex-direction: column; }
#rv   { flex: 1; position: absolute; top: 0; left: 0; right: 0; bottom: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px; display: none; flex-direction: column; gap: 12px; background: #f0f2f5; }
#rv.on { display: flex; }

#leg { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
.ld  { display: flex; align-items: center; gap: 4px; font-size: 12px; color: #64748b; }
.lc  { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

/* ── 새로 추가된 범례 (하단 고정) ── */
#legend {
  position: fixed; bottom: 16px; left: 16px; right: 16px; z-index: 10;
  background: rgba(255,255,255,0.92); border-radius: 12px;
  padding: 10px 14px; box-shadow: 0 4px 14px rgba(0,0,0,0.12);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
  font-size: 12px; color: #475569; pointer-events: none;
}
.litem { display: flex; align-items: center; gap: 6px; }
.lc-small { width: 12px; height: 12px; border-radius: 4px; }

/* ── 예약 모달 스타일 ── */
#modal {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  display: none; align-items: center; justify-content: center;
  z-index: 1000; -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);
}
#modal.show { display: flex; }
#modal-content {
  background: white; border-radius: 16px; width: 92%; max-width: 420px;
  max-height: 85dvh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  padding: 0; position: relative;
}
.modal-header {
  padding: 16px 20px; border-bottom: 1px solid #e2e8f0;
  display: flex; justify-content: space-between; align-items: center;
}
.modal-title { font-size: 17px; font-weight: 700; }
.close-btn { font-size: 24px; color: #64748b; cursor: pointer; padding: 4px 8px; }
.modal-body { padding: 16px 20px; }
.res-item {
  padding: 12px 0; border-bottom: 1px solid #f1f5f9;
  display: flex; flex-direction: column; gap: 4px;
}
.res-item:last-child { border-bottom: none; }
.res-time { font-weight: 700; font-size: 15px; }
.res-name { font-size: 15px; }
.res-people { color: #3b82f6; font-weight: 600; }
.res-memo  { color: #64748b; font-size: 13px; white-space: pre-line; }

/* CSV 버튼 스타일 */
#export-csv {
  background: #10b981; color: white; border: none;
  padding: 10px 16px; border-radius: 10px; font-weight: 600;
  font-size: 14px; cursor: pointer; margin: 12px 16px; align-self: flex-start;
}

#cv  { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; position: relative; width: 100%; min-height: 400px; flex-shrink: 0; overflow: hidden; }
#cvi { position: absolute; inset: 0; overflow: hidden; }
#edbanner { display: none; position: absolute; top: 0; left: 0; right: 0; background: rgba(99,102,241,0.12); border-bottom: 2px dashed #6366f1; padding: 8px; font-size: 13px; color: #6366f1; font-weight: 700; text-align: center; z-index: 5; }
#cv.em #edbanner { display: block; }
#cv.em { border: 2px dashed #6366f1; }

.tc { position: absolute; border-radius: 10px; border: 2px solid; display: flex; flex-direction: column; overflow: hidden; cursor: pointer; }
.tc.bar { border-radius: 8px; flex-direction: row; align-items: center; justify-content: space-between; }
.tc.drag { opacity: 0.82; z-index: 50; box-shadow: 0 8px 24px rgba(0,0,0,0.18); }

#stats { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
.sc { flex: 1; min-width: 120px; background: #fff; border-radius: 10px; padding: 12px 14px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 10px; }
.si { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.sl { font-size: 11px; color: #94a3b8; }
.sv { font-weight: 800; font-size: 15px; }

.bp  { background: #3b82f6; color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-size: 14px; font-weight: 700; cursor: pointer; min-height: 36px;}
.bg  { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px 14px; font-size: 13px; color: #64748b; cursor: pointer; font-weight: 600; min-height: 36px;}
.be  { background: #6366f1; color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 700; cursor: pointer; min-height: 36px;}
.be.on { background: #ef4444; }

.rv-top { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.rv-srch { flex: 1; min-width: 200px; padding: 12px 16px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 15px; outline: none; -webkit-appearance: none; font-family: inherit; background: #fff; }
.rv-srch:focus { border-color: #3b82f6; }

#cal { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; padding: 16px; }
.cal-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.cal-m { font-weight: 800; font-size: 16px; }
.cal-nav { background: none; border: 1px solid #e2e8f0; border-radius: 8px; width: 36px; height: 36px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
.cal-g { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
.cal-dow { text-align: center; font-size: 12px; font-weight: 700; color: #94a3b8; padding: 4px 0; }
.cal-dow:first-child { color: #ef4444; }
.cal-dow:last-child { color: #3b82f6; }
.cd { text-align: center; padding: 8px 4px; border-radius: 8px; font-size: 14px; cursor: pointer; min-height: 44px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; }
.cd.today { background: #eff6ff; color: #3b82f6; font-weight: 800; }
.cd.sel { background: #3b82f6; color: #fff; font-weight: 800; }
.cd.sel .dot { background: #fff; }
.cd.other { color: #cbd5e1; }
.cd.sun { color: #ef4444; } .cd.sat { color: #3b82f6; }
.cd.sel.sun, .cd.sel.sat { color: #fff; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: #3b82f6; }

#rvw { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; margin-top: 12px; }
.rvw-hd { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: space-between; }
.rvw-title { font-weight: 800; font-size: 15px; }
.rvi { padding: 14px 16px; border-bottom: 1px solid #f8fafc; cursor: pointer; display: flex; align-items: flex-start; gap: 12px; }
.rvi:last-child { border-bottom: none; }
.rvi-t { background: #eff6ff; color: #3b82f6; border-radius: 8px; padding: 6px 10px; font-size: 13px; font-weight: 800; flex-shrink: 0; min-width: 54px; text-align: center; }
.rvi-b { flex: 1; min-width: 0; }
.rvi-n { font-weight: 700; font-size: 15px; }
.rvi-s { font-size: 13px; color: #64748b; margin-top: 2px; }
.rvi-m { font-size: 12px; color: #94a3b8; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rvi-st { font-size: 12px; font-weight: 700; border-radius: 6px; padding: 4px 8px; flex-shrink: 0; }

#mo { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.6); z-index: 999; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
#mo.on { display: flex; }
.md { background: #fff; border-radius: 16px; padding: 24px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); margin: auto; }
.md-lg { max-width: 520px !important; }
.md-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.md-title { font-weight: 800; font-size: 18px; }
.md-x { background: #f1f5f9; border: none; border-radius: 50%; width: 36px; height: 36px; font-size: 20px; cursor: pointer; color: #64748b; display: flex; align-items: center; justify-content: center; }
.mb { display: flex; flex-direction: column; gap: 16px; }
.ib { display: flex; flex-direction: column; gap: 8px; padding: 16px; background: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0; }
.ir { display: flex; justify-content: space-between; font-size: 14px; }
.il { color: #64748b; }
.iv { font-weight: 700; }
.gbs { display: flex; gap: 8px; flex-wrap: wrap; }
.gb { width: 48px; height: 48px; border-radius: 10px; border: 2px solid #e2e8f0; background: #fff; color: #64748b; font-weight: 800; font-size: 16px; cursor: pointer; }
.gb.bl { border-color: #3b82f6; background: #eff6ff; color: #3b82f6; }
.gb.pu { border-color: #8b5cf6; background: #f5f3ff; color: #8b5cf6; }
.gb.gr { border-color: #10b981; background: #ecfdf5; color: #065f46; }
.abs { display: flex; gap: 10px; margin-top: 10px;}
.ab { flex: 1; padding: 14px 0; border: none; border-radius: 12px; font-weight: 700; font-size: 15px; cursor: pointer; color: #fff; }
.fg { display: flex; flex-direction: column; gap: 6px; }
.fl { font-size: 13px; color: #64748b; font-weight: 600;}
.fi { width: 100%; padding: 12px 14px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 15px; outline: none; -webkit-appearance: none; font-family: inherit; background: #fff; color: #1e293b; }
.fi:focus { border-color: #3b82f6; }
textarea.fi { resize: none; min-height: 80px; }
.tpb { padding: 14px 16px; background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 15px; font-weight: 700; width: 100%; color: #1e293b; }
.tps { color: #94a3b8; font-size: 13px; font-weight: 500; }
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* 010 고정 폼 */
.prefix-input { display: flex; align-items: center; background: #fff; border: 1.5px solid #e2e8f0; border-radius: 10px; overflow: hidden; padding-left: 14px; }
.prefix-input span { font-weight: 700; color: #64748b; font-size: 15px; flex-shrink: 0; }
.prefix-input input { border: none; outline: none; padding: 12px 14px 12px 8px; flex: 1; font-size: 15px; background: transparent; color: #1e293b; width: 100%; }
.prefix-input:focus-within { border-color: #3b82f6; }

/* 태그 */
.tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
.tag-btn { padding: 8px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px; background: #fff; color: #64748b; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; outline: none; }
.tag-btn.on { background: #eff6ff; border-color: #3b82f6; color: #3b82f6; }
.t-chip { display: inline-block; padding: 4px 8px; border-radius: 6px; background: #f1f5f9; color: #475569; font-size: 11px; font-weight: 700; margin-right: 6px; margin-top: 4px; border: 1px solid #e2e8f0; }

@media (max-width: 820px) {
  #sb { width: 30%; max-width: none; }
  .hd-right { justify-content: flex-start; }
}
@media (max-width: 600px) {
  #body { flex-direction: column; }
  #sb { width: 100%; height: 30%; border-right: none; border-bottom: 1px solid #e2e8f0; }
  #main { height: 70%; padding: 10px;}
  #hd { flex-direction: column; align-items: flex-start; }
  .hd-right { width: 100%; justify-content: space-between; }
  #stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .sc { min-width: 0; }
}
</style>
</head>
<body>
<div id="wrap">
  <div id="hd">
    <div class="hd-left">
      <div class="hd-logo">🍽</div>
      <div>
        <div class="hd-title">테이블 현황</div>
        <div class="hd-date" id="hdate"></div>
      </div>
    </div>
    <div class="hd-right">
      <span id="badge"></span>
      <span class="chip" id="c1" style="color:#3b82f6;border-color:#3b82f629;background:#3b82f615"></span>
      <span class="chip" id="c2" style="color:#8b5cf6;border-color:#8b5cf629;background:#8b5cf615"></span>
      <span class="chip" id="c3" style="color:#f59e0b;border-color:#f59e0b29;background:#f59e0b15"></span>
      <button class="bg" id="baddtb" style="display:none; color:#10b981; border-color:#10b981; font-weight:800;">+ 테이블 추가</button>
      <button class="be" id="bedit">✏️배치</button>
      <button class="bg" id="breset">초기화</button>
    </div>
  </div>

  <div id="tb">
    <button class="tab on" id="t1">🪑 홀 현황</button>
    <button class="tab" id="t2">📋 예약 관리</button>
  </div>

  <div id="body">
    <div id="sb">
      <div class="sb-head">
        <span class="sb-title">대기자</span>
        <button class="bp" id="bwait">+ 추가</button>
      </div>
      <div id="wl"><div style="padding:24px 12px;text-align:center;color:#cbd5e1;font-size:13px">대기자 없음</div></div>
    </div>

    <div id="main">
      <div id="leg">
        <div class="ld"><div class="lc" style="background:#cbd5e1"></div>빈 테이블</div>
        <div class="ld"><div class="lc" style="background:#3b82f6"></div>예약</div>
        <div class="ld"><div class="lc" style="background:#ca8a04"></div>~1시간</div>
        <div class="ld"><div class="lc" style="background:#ea580c"></div>1~1.5h</div>
        <div class="ld"><div class="lc" style="background:#dc2626"></div>1.5h+</div>
        <span id="ehint" style="margin-left:auto;font-size:11px;color:#6366f1;font-weight:700"></span>
      </div>

      <div id="cv"><div id="edbanner">✏️ 길게 누르고 드래그 · 테이블을 짧게 터치해 설정 및 삭제</div><div id="cvi"></div></div>

      <div id="stats">
        <div class="sc"><div class="si" style="background:#3b82f615">👥</div><div><div class="sl">착석 인원</div><div class="sv" id="s1" style="color:#3b82f6">0명</div></div></div>
        <div class="sc"><div class="si" style="background:#f59e0b15">🪑</div><div><div class="sl">착석 테이블</div><div class="sv" id="s2" style="color:#f59e0b">0개</div></div></div>
        <div class="sc"><div class="si" style="background:#10b98115">⬜</div><div><div class="sl">빈 테이블</div><div class="sv" id="s3" style="color:#10b981">0개</div></div></div>
        <div class="sc"><div class="si" style="background:#8b5cf615">⏳</div><div><div class="sl">대기</div><div class="sv" id="s4" style="color:#8b5cf6">0팀</div></div></div>
      </div>
    </div>

    <div id="rv">
      <button id="export-csv">📥 오늘 예약 CSV 다운로드</button>
      <div class="rv-top">
        <input class="rv-srch" id="rvsrch" type="search" placeholder="🔍 이름, 연락처 검색…">
        <button class="bp" id="baddRv">+ 예약 추가</button>
      </div>
      <div id="cal">...</div> <!-- 기존 캘린더 유지 -->
      <div id="rvw">...</div> <!-- 기존 예약 리스트 유지 -->
    </div>
  </div>
</div>

<!-- 범례 패널 -->
<div id="legend">
  <div class="litem"><div class="lc-small" style="background:#e0f2fe"></div>예약 없음</div>
  <div class="litem"><div class="lc-small" style="background:#bfdbfe"></div>오늘 예약</div>
  <div class="litem"><div class="lc-small" style="background:#fecaca"></div>지난 예약</div>
  <div class="litem"><div class="lc-small" style="background:#fed7aa"></div>현재 진행중</div>
</div>

<!-- 예약 상세 모달 -->
<div id="modal">
  <div id="modal-content">
    <div class="modal-header">
      <div class="modal-title">테이블 예약 내역</div>
      <div class="close-btn" onclick="closeResModal()">×</div>
    </div>
    <div class="modal-body" id="res-list-body"></div>
  </div>
</div>

<div id="mo"><div class="md" id="mdc"></div></div>

<script>
// ── 기존 상수 및 상태 (변경 최소화) ────────────────────────────────
var STORAGE_KEY = 'tv5';
var RES_KEY = 'tv5_reservations'; // 예약 분리 저장
var INIT_TABLES = [ /* 기존 INIT_TABLES 그대로 */ ];
var TAG_LIST = ['회식', '기념일', '생일', '코스(일반)', '코스(한우)'];

var S = { tables: [], waits: [], ress: [] };
var currentTab = 'floor';
var editMode = false;
var saveTimer = null;
var calY = new Date().getFullYear();
var calM = new Date().getMonth();
var calSel = null;
// ... 기존 변수들 유지 ...

// ── 새 헬퍼 함수들 ────────────────────────────────────────────────
function getToday() {
  return new Date().toISOString().split('T')[0];
}

function loadReservations() {
  try {
    S.ress = JSON.parse(localStorage.getItem(RES_KEY) || '[]');
  } catch(e) { S.ress = []; }
}

function saveReservations() {
  localStorage.setItem(RES_KEY, JSON.stringify(S.ress));
}

function getTableReservations(tableId) {
  return S.ress.filter(r => r.tableId === tableId)
               .sort((a,b) => (a.date + a.time).localeCompare(b.date + b.time));
}

function updateTableFromReservations() {
  const today = getToday();
  S.tables.forEach(tb => {
    const resList = getTableReservations(tb.id);
    const hasToday = resList.some(r => r.date === today && r.st !== 'cancelled' && r.st !== 'noshow');
    const hasPast  = resList.some(r => r.date < today && r.st !== 'cancelled' && r.st !== 'noshow');

    if (tb.st === 'occupied' || tb.st === 'reserved') return; // 착석/현재예약 우선

    if (hasToday) {
      tb.st = 'reserved';
      tb.res = resList.find(r => r.date === today) || null;
    } else if (hasPast) {
      tb.st = 'empty'; // 과거 예약은 표시만 하고 색상으로 구분
      tb.res = null;
    } else {
      tb.st = 'empty';
      tb.res = null;
    }
  });
}

// ── 홀 색상 업데이트 (기존 tableColor 강화) ────────────────────────
function tableColor(st, seatTime, isLinked, tableId) {
  if (st === 'occupied') {
    const elapsed = Date.now() - seatTime;
    if (elapsed < 3600000) return {bg:'#fefce8', bd:'#ca8a04', tx:'#78350f'};
    if (elapsed < 5400000) return {bg:'#fff7ed', bd:'#ea580c', tx:'#7c2d12'};
    return {bg:'#fef2f2', bd:'#dc2626', tx:'#7f1d1d'};
  }
  if (st === 'reserved') return {bg:'#eff6ff', bd:'#3b82f6', tx:'#1d4ed8'};
  if (isLinked) return {bg:'#f0fdf4', bd:'#22c55e', tx:'#15803d'};

  // 예약 기반 색상
  const res = getTableReservations(tableId);
  const today = getToday();
  const hasToday = res.some(r => r.date === today && r.st !== 'cancelled' && r.st !== 'noshow');
  const hasPast  = res.some(r => r.date < today && r.st !== 'cancelled' && r.st !== 'noshow');

  if (hasToday) return {bg:'#bfdbfe', bd:'#60a5fa', tx:'#1e40af'};
  if (hasPast)  return {bg:'#fecaca', bd:'#f87171', tx:'#991b1b'};
  return {bg:'#f8fafc', bd:'#cbd5e1', tx:'#94a3b8'};
}

// renderCanvas 내부에서 색상 적용 부분 수정 (기존 코드에 추가/변경)
function renderCanvas() {
  // ... 기존 코드 ...

  S.tables.forEach(function(tb) {
    // ... 기존 card 생성 ...

    const isLinked = !!tb.linkTo;
    const c = tableColor(tb.st, tb.seatTime, isLinked, tb.id);

    card.style.background = c.bg;
    card.style.borderColor = c.bd;
    // ... 나머지 스타일 ...

    // 캐시 키에 예약 정보 추가
    const resHash = getTableReservations(tb.id).map(r=>r.id+r.st).join(',');
    const cacheKey = tb.st + '|' + tb.g + '|' + (tb.seatTime||0) + '|' + resHash + '|' + editMode + '|' + tb.linkTo;

    if (cardCache[tb.id] === cacheKey) return;
    cardCache[tb.id] = cacheKey;

    // ... html 생성 부분 유지 ...
  });
}

// ── 테이블 클릭 시 예약 모달 열기 (기존 openTableModal 수정) ───────
function openTableModal(tid) {
  if (editMode) return openTableConfig(tid);

  const tb = S.tables.find(t => t.id === tid);
  if (!tb) return;

  // 기존 착석/예약 모달 대신 → 예약 리스트 모달 우선
  showTableReservations(tid, tb.n);
}

// ── 예약 리스트 모달 ──────────────────────────────────────────────
function showTableReservations(tableId, tableName) {
  const res = getTableReservations(tableId);
  let html = '';

  if (res.length === 0) {
    html = '<p style="text-align:center; color:#94a3b8; padding:40px 0;">이 테이블의 예약 내역이 없습니다.</p>';
  } else {
    html = res.map(r => `
      <div class="res-item">
        <div class="res-time">${r.date} ${r.time} (${r.g}명)</div>
        <div class="res-name">${esc(r.nm)} ${r.phone ? `(${r.phone})` : ''}</div>
        ${r.tags?.length ? '<div>' + renderTagChips(r.tags) + '</div>' : ''}
        ${r.memo ? `<div class="res-memo">메모: ${esc(r.memo)}</div>` : ''}
        <div style="margin-top:12px; display:flex; gap:8px;">
          <button onclick="cancelRes('${r.id}')" style="background:#ef4444;color:white;border:none;padding:8px 14px;border-radius:10px;font-size:14px;">취소</button>
          <button onclick="noshowRes('${r.id}')" style="background:#f59e0b;color:white;border:none;padding:8px 14px;border-radius:10px;font-size:14px;">노쇼</button>
        </div>
      </div>
    `).join('');
  }

  document.getElementById('res-list-body').innerHTML = `
    <h3 style="margin:0 0 20px 0; font-size:18px;">${esc(tableName)}</h3>
    ${html}
  `;
  document.getElementById('modal').classList.add('show');
}

function closeResModal() {
  document.getElementById('modal').classList.remove('show');
}

// ── 취소 / 노쇼 처리 ───────────────────────────────────────────────
function cancelRes(rid) {
  if (!confirm('이 예약을 취소하시겠습니까?')) return;
  S.ress = S.ress.map(r => r.id === rid ? {...r, st: 'cancelled'} : r);
  saveReservations();
  saveData();
  closeResModal();
  renderAll();
  alert('예약이 취소되었습니다.');
}

function noshowRes(rid) {
  if (!confirm('노쇼로 처리하시겠습니까?')) return;
  S.ress = S.ress.map(r => {
    if (r.id === rid) {
      return {...r, st: 'noshow', memo: (r.memo || '') + ' [노쇼 처리됨 ' + new Date().toLocaleString('ko-KR') + ']'};
    }
    return r;
  });
  saveReservations();
  saveData();
  closeResModal();
  renderAll();
  alert('노쇼 처리 완료');
}

// ── CSV 내보내기 ──────────────────────────────────────────────────
document.getElementById('export-csv')?.addEventListener('click', exportTodayCSV);

function exportTodayCSV() {
  const today = getToday();
  const list = S.ress.filter(r => r.date === today && r.st !== 'cancelled');

  if (list.length === 0) {
    alert('오늘 예약 내역이 없습니다.');
    return;
  }

  const headers = ['날짜','시간','이름','인원','연락처','테이블ID','태그','메모','상태'];
  const csvRows = [headers.join(',')];

  list.forEach(r => {
    const row = [
      r.date,
      r.time,
      `"${esc(r.nm).replace(/"/g,'""')}"`,
      r.g,
      r.phone || '',
      r.tableId || '',
      `"${(r.tags||[]).join(', ')}"`,
      `"${esc(r.memo||'').replace(/"/g,'""').replace(/\n/g,' ')}"`,
      r.st || 'confirmed'
    ];
    csvRows.push(row.join(','));
  });

  const csv = csvRows.join('\n');
  const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], {type: 'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `예약_${today}.csv`;
  link.click();
  URL.revokeObjectURL(url);
}
